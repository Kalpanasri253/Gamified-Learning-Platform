<h1>Quiz Management</h1>

<div class="container">

<div class="card">

<input type="hidden" id="id">

<input type="text" id="subject" placeholder="Subject">

<input type="text" id="title" placeholder="Quiz Title">

<input type="number" id="totalMarks" placeholder="Total Marks">

<br><br>

<button onclick="saveQuiz()">💾 Save Quiz</button>

<a href="dashboard.html">
<button type="button">🏠 Dashboard</button>
</a>

</div>

</div>

<br>

<center>

<input type="text"
id="search"
placeholder="🔍 Search Quiz..."
onkeyup="searchQuiz()"
style="width:350px;">

</center>

<br>

<table id="quizTable">

<thead>

<tr>

<th>ID</th>
<th>Subject</th>
<th>Title</th>
<th>Total Marks</th>
<th>Actions</th>

</tr>

</thead>

<tbody>

</tbody>

</table>
