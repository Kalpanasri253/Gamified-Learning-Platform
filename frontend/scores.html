<h1>Score Management</h1>

<div class="container">

<div class="card">

<input type="hidden" id="id">

<input type="number" id="studentId" placeholder="Student ID">

<input type="number" id="quizId" placeholder="Quiz ID">

<input type="number" id="marks" placeholder="Marks">

<input type="number" id="totalMarks" placeholder="Total Marks">

<br><br>

<button onclick="saveScore()">💾 Save Score</button>

<a href="dashboard.html">
<button type="button">🏠 Dashboard</button>
</a>

</div>

</div>

<br>

<center>

<input
type="text"
id="search"
placeholder="🔍 Search Score..."
onkeyup="searchScore()"
style="width:350px;">

</center>

<br>

<table id="scoreTable">

<thead>

<tr>

<th>ID</th>
<th>Student ID</th>
<th>Quiz ID</th>
<th>Marks</th>
<th>Total Marks</th>
<th>Actions</th>

</tr>

</thead>

<tbody>

</tbody>

</table>
